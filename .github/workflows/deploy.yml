name: Deploy to Aliyun

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/ai/**"
      - "packages/agent/**"
      - "packages/coding-agent/**"
      - "packages/mom/**"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LC}/pi-mono-mom" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mom/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Push docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/mom/"

      - name: Pull image and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/mom

            echo "::group::Pull image"
            docker compose pull mom
            echo "::endgroup::"

            echo "::group::Up"
            docker compose up -d
            sleep 4
            docker compose ps
            echo "::endgroup::"

            echo "::group::Health check"
            if [ "$(docker inspect --format='{{.State.Running}}' mom 2>/dev/null)" != "true" ]; then
              echo "mom container not running, recent logs:"
              docker logs --tail 100 mom 2>&1 || true
              exit 1
            fi
            echo "mom is running"
            echo "::endgroup::"

            echo "::group::Prune old images (keep last 3)"
            docker image prune -f --filter "until=168h" || true
            echo "::endgroup::"
