services:
  mom-sandbox:
    image: alpine:latest
    container_name: mom-sandbox
    command: tail -f /dev/null
    restart: unless-stopped
    volumes:
      - /opt/mom/data:/workspace
      # Project repo the agent is allowed to read/edit/commit on.
      # Clone on host first: git clone <url> /opt/projects/hrsystem
      - /opt/projects/hrsystem:/workspace/hrsystem
      # Per-repo SSH deploy key + git identity so the agent can `git push`.
      # See "推送权限" section in the deploy notes for setup.
      - /opt/mom/sandbox-ssh:/root/.ssh:ro

  mom:
    image: ghcr.io/zixunhuangupenn/pi-mono-mom:latest
    container_name: mom
    restart: unless-stopped
    depends_on:
      - mom-sandbox
    env_file: ./.env
    environment:
      TZ: Asia/Shanghai
    volumes:
      # Same host dir mounted at a different path — see translatePath in agent.ts
      - /opt/mom/data:/workspace/data
      # docker.sock: lets mom `docker exec mom-sandbox ...`. This effectively
      # gives the mom container root on the host. Acceptable because mom *is*
      # the orchestrator; the LLM-controlled bash still runs inside sandbox.
      - /var/run/docker.sock:/var/run/docker.sock
